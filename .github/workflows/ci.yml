name: EcoRoute AI CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20" # গিটহাব অফিশিয়ালি পুরোপুরি বন্ধ করার আগ পর্যন্ত ২০ রাখাই সেফ
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Build
        run: NEXT_DISABLE_SOURCEMAPS=true NEXT_TELEMETRY_DISABLED=1 npx next build
        env:
          MONGODB_URI: "mongodb+srv://test:test@cluster.mongodb.net/test"
          NEXT_PUBLIC_FIREBASE_apiKey: "test"
          NEXT_PUBLIC_FIREBASE_authDomain: "test"
          NEXT_PUBLIC_FIREBASE_projectId: "test"
          NEXT_PUBLIC_FIREBASE_storageBucket: "test"
          NEXT_PUBLIC_FIREBASE_messagingSenderId: "test"
          NEXT_PUBLIC_FIREBASE_appId: "test"
